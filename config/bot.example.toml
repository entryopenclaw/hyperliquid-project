[hyperliquid]
network = "testnet"
account_address = "${HL_ACCOUNT_ADDRESS}"
secret_key_env = "HL_SECRET_KEY"
vault_address = "${HL_VAULT_ADDRESS}"
api_url = ""

[market]
symbol = "BTC"
candle_interval = "1m"
depth_levels = 5
feature_window = 200

[execution]
mode = "paper"
limit_offset_bps = 1.0
ioc_slippage_bps = 8.0
reconcile_interval_s = 15
schedule_cancel_after_s = 20
max_open_orders = 3

[risk]
max_leverage = 2
base_order_notional_usd = 50
max_position_notional_usd = 250
max_daily_loss_usd = 25
max_drawdown_usd = 40
max_slippage_bps = 12
max_spread_bps = 8
max_data_age_s = 5
max_reject_streak = 3
cooldown_after_stop_s = 300
min_account_value_usd = 50

[strategy]
long_entry_bps = 2.0
short_entry_bps = -2.0
exit_threshold_bps = 0.5
min_confidence = 0.55
position_scale = 1.0
urgency_confidence = 0.8

[training]
enabled = true
retrain_interval_hours = 24
min_training_rows = 300
train_window_rows = 5000
validation_rows = 1000
lookahead_bars = 3
promotion_min_expectancy_bps = 0.5
promotion_min_win_rate = 0.52
promotion_max_drawdown_usd = 20
promotion_max_turnover = 40

[storage]
root_dir = "data"
sqlite_path = "data/runtime.db"
raw_events_path = "data/raw_events.jsonl"
features_path = "data/features.jsonl"
models_dir = "data/models"
reports_dir = "data/reports"
status_path = "data/status.json"

[monitoring]
enable_http = false
host = "127.0.0.1"
port = 8080
log_level = "INFO"
